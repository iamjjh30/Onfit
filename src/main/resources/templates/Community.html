<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" th:href="@{/img/interface/favicon.png}" type="image/x-icon">
    <title>OnFit — Community</title>
    <link rel="stylesheet" th:href="@{/css/Main.css}">
    <link rel="stylesheet" th:href="@{/css/Community.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div id="wrap">
    <!-- ── 탭 내비게이션 (AIStyler 스타일) ── -->
    <div class="tab-navigation">
        <button class="tab-btn active" data-menu="ALL">전체</button>
        <button class="tab-btn" data-menu="TF">오늘의 핏</button>
        <button class="tab-btn" data-menu="잡담">잡담</button>
        <button class="tab-btn" data-menu="추천">추천</button>
        <button class="tab-btn" data-menu="자랑">자랑</button>

    </div>

    <div class="community-layout">
        <!-- ── 사이드바 ── -->
        <aside class="sidebar">
            <div class="sidebar-search">
                <div class="search_wrapper">
                    <svg class="search_icon_svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" placeholder="검색..." class="search_input" id="searchInput">
                </div>
                <a th:href="@{/community/write}" class="write-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    글쓰기
                </a>
            </div>

            <a th:if="${session.loginMember != null}" th:href="@{/PwdCheck}" class="user-profile-link">
                <div class="user_profile">
                    <div class="profile_img">
                        <img th:src="@{/img/interface/ProfileDefault.png}" alt="profile" id="userProfileImg">
                    </div>
                    <div class="profile_info">
                        <span class="user_name" id="userName" th:text="${session.loginMember.name}">사용자 이름</span>
                        <span class="user_sub">내 프로필 보기</span>
                    </div>
                </div>
            </a>

            <a th:unless="${session.loginMember != null}" th:href="@{/login}" class="user-profile-link is-logged-out">
                <div class="user_profile">
                    <div class="profile_info">
                        <span class="user_name" id="userName">로그인 해주세요</span>
                        <span class="user_sub">클릭해서 로그인</span>
                    </div>
                </div>
            </a>
        </aside>

        <!-- ── 게시글 목록 ── -->
        <main class="list_container" id="postListContainer">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <span>게시글을 불러오는 중...</span>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<div id="toast"></div>
<script th:src="@{/js/include.js}"></script>
<script th:src="@{/js/Community.js}"></script>
</body>
</html>
