<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnFit.com</title>
    <style>
        /* BTI Test Page Styling */
        /* Design Philosophy: Minimalist, modern, with smooth interactions */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .bti-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* Header & Progress */
        .bti-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .bti-progress-wrapper {
            max-width: 600px;
            margin: 0 auto;
        }

        .bti-progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .bti-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b 0%, #d97706 100%);
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .bti-progress-text {
            text-align: center;
            font-size: 12px;
            color: #666;
            font-weight: 500;
            margin: 0;
        }

        /* Main Content */
        .bti-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            margin-top: 80px;
            margin-bottom: 40px;
        }

        .bti-card {
            background: white;
            border-radius: 24px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            width: 100%;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .bti-question {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0 0 50px 0;
            line-height: 1.4;
            letter-spacing: -0.5px;
        }

        /* Choice Buttons */
        .bti-choices {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .bti-choice {
            width: 100%;
            padding: 24px 20px;
            border: 2px solid #e0e0e0;
            background: #f9f9f9;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            font-weight: 500;
            color: #333;
            text-align: center;
            font-family: 'Pretendard', sans-serif;
            line-height: 1.5;
            word-break: keep-all;
        }

        .bti-choice:hover {
            border-color: #f59e0b;
            background: #fffbeb;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245, 158, 11, 0.15);
        }

        .bti-choice:active {
            transform: translateY(0);
        }

        .bti-choice-text {
            display: block;
        }

        .bti-divider {
            font-size: 14px;
            color: #999;
            font-weight: 500;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Result Screen */
        .bti-result-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            margin-top: 80px;
            animation: fadeIn 0.4s ease;
        }

        .bti-result-screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .bti-result-card {
            background: white;
            border-radius: 24px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            width: 100%;
            text-align: center;
        }

        .bti-result-title {
            font-size: 20px;
            font-weight: 600;
            color: #666;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bti-result-type {
            font-size: 80px;
            font-weight: 900;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
            letter-spacing: -2px;
        }

        .bti-result-subtitle {
            font-size: 16px;
            color: #999;
            margin: 20px 0 40px 0;
            font-weight: 400;
        }

        .bti-fashion-recommendation {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
            text-align: left;
        }

        .bti-fashion-style {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
        }

        .bti-fashion-description {
            font-size: 15px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .bti-fashion-items {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .bti-fashion-items li {
            background: #f0f0f0;
            color: #555;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .bti-fashion-style {
                font-size: 20px;
            }
            .bti-fashion-description {
                font-size: 14px;
            }
            .bti-fashion-items li {
                font-size: 13px;
            }
        }

        /* Result Action Buttons */
        .bti-result-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 40px;
        }

        .bti-btn {
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Pretendard', sans-serif;
            text-transform: none;
        }

        .bti-btn-primary {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }

        .bti-btn-primary:hover {
            box-shadow: 0 12px 32px rgba(245, 158, 11, 0.4);
            transform: translateY(-2px);
        }

        .bti-btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .bti-btn-secondary:hover {
            background: #e8e8e8;
            border-color: #d0d0d0;
            transform: translateY(-2px);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .bti-container {
                padding: 16px;
            }

            .bti-header {
                padding: 16px;
            }

            .bti-card {
                padding: 40px 24px;
                margin-top: 100px;
            }

            .bti-question {
                font-size: 22px;
                margin-bottom: 40px;
            }

            .bti-choice {
                padding: 20px 16px;
                font-size: 15px;
            }

            .bti-result-card {
                padding: 40px 24px;
                margin-top: 100px;
            }

            .bti-result-type {
                font-size: 60px;
            }

            .bti-result-actions {
                flex-direction: column;
            }

            .bti-btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .bti-card {
                padding: 32px 20px;
                border-radius: 16px;
            }

            .bti-question {
                font-size: 20px;
                margin-bottom: 32px;
            }

            .bti-choice {
                padding: 18px 14px;
                font-size: 14px;
                border-radius: 12px;
            }

            .bti-result-type {
                font-size: 48px;
            }

            .bti-result-card {
                padding: 32px 20px;
                border-radius: 16px;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<div th:replace="~{fragments/header :: header}"></div>
<div class="bti-container">
    <!-- Header with progress -->
    <div class="bti-header">

    <!-- Question Card -->

            <!-- Choice Buttons -->
            <div class="bti-choices">

                </button>

                <button class="bti-choice bti-choice-right" id="rightChoice">
                    <span class="bti-choice-text" id="rightChoiceText"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- Result Screen -->
    <div class="bti-result-screen" id="resultScreen">
        <div class="bti-result-card">
            <h2 class="bti-result-title">나의 Fit BTI 타입은?</h2>
            <div class="bti-result-type" id="resultType">----</div>
            <p class="bti-result-subtitle">당신의 패션 성향이 분석되었습니다</p>

            <div class="bti-fashion-recommendation">

                <p class="bti-fashion-description" id="fashionDescription"></p>
                <ul class="bti-fashion-items" id="fashionItems"></ul>
            </div>

            <div class="bti-result-actions">
                <a th:href="@{/store}" style="text-decoration:none;">
                    <button class="bti-btn bti-btn-primary" id="shopBtn"> 쇼핑하러 가기 </button>
                </a>
                <button class="bti-btn bti-btn-secondary" id="retryBtn">
                    다시 하기
                </button>
            </div>
        </div>
    </div>
</div>

        'ENTJ': {
            style: '파워풀 & 엣지',
            description: '결단력 있고 통솔력 있는 ENTJ는 파워풀하고 엣지 있는 스타일을 추구합니다. 강렬한 색감과 구조적인 디자인으로 당신의 자신감을 표현해보세요.',
            items: ['숄더 패드 자켓', '레더 팬츠', '체인 목걸이', '하이힐 부츠']
        }
    };

    function initializeTest() {
        currentQuestion = 0;
        answers = [];
        showQuestion();
    }

    function showQuestion() {
        const question = questions[currentQuestion];
        questionText.textContent = question.text;
        leftChoiceText.textContent = question.leftOption.text;
        rightChoiceText.textContent = question.rightOption.text;

        currentQuestionSpan.textContent = currentQuestion + 1;
        totalQuestionsSpan.textContent = questions.length;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        progressFill.style.width = progress + '%';

        questionCard.classList.remove('hidden');
        resultScreen.classList.remove('active');
    }

    function handleChoice(type) {
        answers.push(type);

        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            showQuestion();
        } else {
            calculateResult();
        }
    }

    function calculateResult() {
        const score = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        answers.forEach((type) => {
            if (type in score) {
                score[type]++;
            }
        });

        const mbtiType =
            (score.E >= score.I ? 'E' : 'I') +
            (score.S >= score.N ? 'S' : 'N') +
            (score.T >= score.F ? 'T' : 'F') +
            (score.J >= score.P ? 'J' : 'P');

        resultType.textContent = mbtiType;

        const fashionRec = mbtiFashion[mbtiType];
        if (fashionRec) {
            document.getElementById('fashionStyle').textContent = fashionRec.style;
            document.getElementById('fashionDescription').textContent = fashionRec.description;
            document.getElementById('fashionItems').innerHTML = fashionRec.items.map(item => `<li>${item}</li>`).join('');
        }

        questionCard.classList.add('hidden');
        resultScreen.classList.add('active');
    }

    function retry() {
        initializeTest();
    }

    // Event listeners
    leftChoice.addEventListener('click', () => {
        handleChoice(questions[currentQuestion].leftOption.type);
    });

    rightChoice.addEventListener('click', () => {
        handleChoice(questions[currentQuestion].rightOption.type);
    });

    retryBtn.addEventListener('click', retry);

    // Initialize on load
    window.addEventListener('load', initializeTest);
</script>
</body>
</html>
