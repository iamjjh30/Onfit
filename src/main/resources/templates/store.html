<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OnFit - Color Store</title>
    <link rel="icon" th:href="@{/img/interface/favicon.png}" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/css/store.css}">
    <link rel="stylesheet" th:href="@{/css/Main.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div id="wrap">
    <div class="store-header">
        <h1>COLOR STORE</h1>

        <div class="store-nav">
            <nav class="category-tabs">
                <a href="#" class="active" data-target="ALL">전체</a>
                <a href="#" data-target="SHIRT">셔츠</a>
                <a href="#" data-target="HOODIE">후드티</a>
                <a href="#" data-target="JACKET">자켓</a>
                <a href="#" data-target="PANTS">팬츠</a>
                <a href="#" data-target="CAP">모자</a>
            </nav>

            <div class="filter-wrapper">
                <button id="filter-btn" class="filter-toggle">
                    FILTER & SORT <span class="icon">▼</span>
                </button>

                <div id="filter-dropdown" class="filter-dropdown-menu">
                    <div class="filter-inner">
                        <div class="filter-column">
                            <h4>정렬기준</h4>
                            <label><input type="radio" name="sort" value="price_low"> 가격 낮은순</label>
                            <label><input type="radio" name="sort" value="price_high"> 가격 높은순</label>
                            <label><input type="radio" name="sort" value="newest"> 최신순</label>
                            <label><input type="radio" name="sort" value="popular"> 인기순</label>
                        </div>

                        <div class="filter-column color-filter-group">
                            <h4>퍼스널 컬러 톤</h4>
                            <div style="display: flex; flex-direction: column; gap: 12px; font-size: 0.95rem; padding-top: 5px;">
                                <label><input type="checkbox" name="tone" value="NEUTRAL"> 🤍 뉴트럴 톤 (기본/무채색)</label>
                                <label><input type="checkbox" name="tone" value="SPRING_WARM"> 🌸 봄 웜톤 (Spring Warm)</label>
                                <label><input type="checkbox" name="tone" value="SUMMER_COOL"> 🌊 여름 쿨톤 (Summer Cool)</label>
                                <label><input type="checkbox" name="tone" value="AUTUMN_WARM"> 🍂 가을 웜톤 (Autumn Warm)</label>
                                <label><input type="checkbox" name="tone" value="WINTER_COOL"> ❄️ 겨울 쿨톤 (Winter Cool)</label>
                            </div>
                        </div>

                        <div class="filter-column">
                            <h4>가격</h4>
                            <div class="price-inputs">
                                <input type="number" id="min-price" placeholder="최소">
                                <span>~</span>
                                <input type="number" id="max-price" placeholder="최대">
                            </div>
                        </div>
                    </div>
                    <div class="filter-actions">
                        <button type="button" class="apply-btn">적용하기</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <main class="product-grid">
        <div class="product-item"
             th:each="product : ${products}"
             th:data-price="${product.price}"
             th:data-tone="${product.recommendedSeasons}"
             th:data-category="${product.category}"
             th:data-created="${product.createdAt}"
             th:data-view="${product.viewCount}"
        >

            <a th:href="@{/itemDetail(id=${product.id})}">
                <div class="product-thumb">
                    <img th:src="@{${product.imageUrl}}" th:alt="${product.name}"
                         style="width:100%; height:100%; object-fit:cover; border-radius:12px;">
                </div>
                <div class="product-info">
                    <p class="price" th:text="${#numbers.formatInteger(product.price, 3, 'COMMA')} + '원'">가격</p>

                    <p class="name" th:text="${product.name}">상품명</p>

                    <p class="category"
                       th:text="${product.category == 'SHIRT' ? '셔츠' :
                                (product.category == 'JACKET' ? '자켓' :
                                (product.category == 'PANTS' ? '팬츠' :
                                (product.category == 'CAP' ? '모자' : '후드티')))}">
                        카테고리
                    </p>
                </div>
            </a>
        </div>
    </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/store.js}"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
