<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="header">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Pretendard:wght@300;400;500;600;700&display=swap');

        /* ====================================================
           GNB — Modern Redesign (투명도 최적화 버전)
           ==================================================== */

        * { box-sizing: border-box; }

        #header {
            position: fixed !important;
            top: 14px !important;
            left: 4vw !important;
            right: 4vw !important;
            z-index: 9999 !important;
            width: auto !important;
            height: auto !important;
            border-radius: 10px !important;

            background: rgba(255, 255, 255, 0.4) !important;
            backdrop-filter: blur(8px) saturate(180%) !important;
            -webkit-backdrop-filter: blur(24px) saturate(180%) !important;

            border: 1px solid rgba(255, 255, 255, 0.25) !important;

            box-shadow:
                    0 2px 0 0 rgba(255,255,255,0.5) inset,
                    0 8px 32px -4px rgba(0,0,0,0.06),
                    0 2px 8px -2px rgba(0,0,0,0.02) !important;
            display: block !important;
            transition:
                    background 0.5s cubic-bezier(0.16,1,0.3,1),
                    border-color 0.5s cubic-bezier(0.16,1,0.3,1),
                    box-shadow 0.5s cubic-bezier(0.16,1,0.3,1),
                    border-radius 0.4s cubic-bezier(0.16,1,0.3,1) !important;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif !important;
        }

        #header.search-open {
            overflow: hidden !important;
            border-radius: 20px 20px 16px 16px !important;
            background: rgba(255, 255, 255, 0.92) !important;
            border-color: rgba(220, 220, 220, 0.5) !important;
            box-shadow:
                    0 2px 0 0 rgba(255,255,255,1) inset,
                    0 32px 80px -8px rgba(0,0,0,0.12),
                    0 8px 24px -4px rgba(0,0,0,0.05) !important;
        }

        /* ── Header Bar ── */
        #header-bar {
            height: 54px;
            display: flex;
            align-items: center;
            width: 100%;
            padding: 0 4px;
        }

        /* ── Logo ── */
        #logo {
            display: flex;
            align-items: center;
            padding: 0 8px 0 14px;
            flex-shrink: 0;
        }
        #logo img {
            width: 36px;
            height: 36px;
            display: block;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.3s ease;
            cursor: pointer;
        }
        #logo img:hover {
            transform: rotate(50deg) scale(1.08);
            filter: drop-shadow(0 2px 8px rgba(255, 184, 52, 0.4));
        }

        /* ── Nav ── */
        #header-bar > nav {
            margin-left: 6px;
        }
        #header-bar > nav ul {
            display: flex;
            margin: 0;
            padding: 0;
            list-style: none;
            gap: 2px;
        }
        #header-bar > nav ul li {
            position: relative;
            cursor: pointer;
            white-space: nowrap;
        }
        #header-bar > nav ul li a {
            display: block;
            text-decoration: none;
            color: rgba(0, 0, 0, 0.7);
            font-size: 17px;
            font-weight: 500;
            letter-spacing: -0.01em;
            padding: 6px 14px;
            border-radius: 10px;
            transition: color 0.2s ease, background 0.2s ease;
        }
        #header-bar > nav ul li a:hover {
            color: rgba(0, 0, 0, 0.95);
        }
        #header-bar > nav ul li a::after {
            content: '';
            position: absolute;
            bottom: 6px;
            left: 14px;
            right: 14px;
            height: 2px;
            background: #FFB834;
            border-radius: 2px;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #header-bar > nav ul li a:hover::after {
            transform: scaleX(1);
        }

        /* ── Active Nav (현재 페이지) ── */
        #header-bar > nav ul li a.nav-active {
            color: rgba(0, 0, 0, 0.95);
            font-weight: 600;
        }
        #header-bar > nav ul li a.nav-active::after {
            transform: scaleX(1);
        }

        /* ── Search Box ── */
        #header-search-inline {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding-right: 6px;
        }
        #header-search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 220px;
            height: 34px;
            border-radius: 50px;
            padding: 0 14px;
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.06);
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, width 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        #header-search-box:hover {
            width: 240px;
        }
        #header-search-placeholder {
            font-size: 12.5px;
            color: rgba(0, 0, 0, 0.38);
            font-weight: 400;
            letter-spacing: -0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Icon Buttons ── */
        .header_icon {
            text-decoration: none;
            color: inherit;
            flex-shrink: 0;
            width: auto;
            height: 54px;
            padding: 0 10px;
            position: relative;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .header_icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 0 10px;
            border-radius: 10px;
            transition: background 0.2s ease;
        }
        .header_icon img {
            width: 22px;
            height: 22px;
            display: block;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), filter 0.25s ease;
        }
        .header_icon:hover img {
            transform: scale(1.1);
            filter: sepia(1) saturate(4) hue-rotate(5deg) brightness(1.0);
        }

        /* ── 프로필 아이콘 툴팁 (로그인 시 로그아웃 노출) ── */
        .profile-tooltip-wrap {
            position: relative;
        }
        .profile-tooltip {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: rgba(255,255,255,0.97);
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 12px;
            box-shadow: 0 8px 32px -4px rgba(0,0,0,0.12), 0 2px 8px -2px rgba(0,0,0,0.06);
            padding: 6px;
            min-width: 130px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-6px);
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;
            z-index: 10000;
            white-space: nowrap;
        }
        .profile-tooltip-wrap:hover .profile-tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .profile-tooltip a,
        .profile-tooltip span {
            display: block;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(0,0,0,0.72);
            text-decoration: none;
            letter-spacing: -0.01em;
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .profile-tooltip a:hover,
        .profile-tooltip span:hover {
            background: rgba(255,184,52,0.1);
            color: #C8860A;
            font-weight: 600;
        }
        .profile-tooltip-divider {
            height: 1px;
            background: rgba(0,0,0,0.06);
            margin: 4px 6px;
        }

        /* ── Search Panel ── */
        #search-panel {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.5s cubic-bezier(0.16,1,0.3,1), opacity 0.3s ease;
        }
        #header.search-open #search-panel {
            max-height: 440px;
            opacity: 1;
        }

        #search-panel-inner {
            padding: 0 24px 24px;
            border-top: 1px solid rgba(0,0,0,0.06);
        }

        .sp-input-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 0 14px;
            border-bottom: 1.5px solid #111;
            margin-bottom: 20px;
        }

        #sp-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 19px;
            font-weight: 700;
            color: #111;
            font-family: 'Pretendard', -apple-system, sans-serif;
            letter-spacing: -0.02em;
        }
        #sp-input::placeholder { color: #ccc; font-weight: 400; }

        #sp-cancel {
            font-size: 12.5px;
            font-weight: 600;
            color: #aaa;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            transition: color 0.2s ease, background 0.2s ease;
            letter-spacing: -0.01em;
            white-space: nowrap;
        }
        #sp-cancel:hover { color: #333; background: rgba(0,0,0,0.05); }

        #sp-results-content { display: none; margin-top: 8px; }
        .search-result-container { display: flex; gap: 32px; }
        .result-left { width: 132px; flex-shrink: 0; }

        .sp-section-label {
            font-size: 9.5px;
            font-weight: 700;
            letter-spacing: 0.14em;
            color: #c0c0c0;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-family: 'Syne', sans-serif;
        }

        .filter-buttons { display: flex; flex-direction: column; gap: 6px; }

        .res-btn {
            width: 100%;
            padding: 9px 14px;
            border-radius: 12px;
            border: 1px solid #eeeeee;
            background: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
            letter-spacing: -0.01em;
            color: #333;
            font-family: 'Pretendard', sans-serif;
        }
        .res-btn:hover { border-color: #ddd; background: #f8f8f8; }
        .res-btn.active { background: #111; color: #fff; border-color: #111; }

        .result-right { flex: 1; overflow: hidden; }
        .product-grid {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding-bottom: 4px;
        }
        .product-grid::-webkit-scrollbar { display: none; }

        .prod-card {
            width: 140px;
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .prod-card:hover { transform: translateY(-3px); }

        .prod-img {
            width: 100%;
            height: 170px;
            background: #f5f5f5;
            border-radius: 12px;
            margin-bottom: 9px;
            overflow: hidden;
        }
        .prod-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
        }
        .prod-card:hover .prod-img img { transform: scale(1.06); }

        .p-name {
            font-size: 13px;
            font-weight: 600;
            color: #111;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.01em;
        }
        .p-price { font-size: 12px; color: #999; margin-top: 3px; font-weight: 400; }

        .sp-tags { display: flex; flex-wrap: wrap; gap: 7px; }
        .sp-tag {
            padding: 7px 16px;
            border-radius: 50px;
            border: 1px solid #ebebeb;
            font-size: 13px;
            font-weight: 500;
            background: #fafafa;
            cursor: pointer;
            color: rgba(0,0,0,0.65);
            letter-spacing: -0.01em;
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
        }
        .sp-tag:hover {
            background: #111;
            color: #fff;
            border-color: #111;
            transform: translateY(-1px);
        }

        /* ── Mask ── */
        #header-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.12);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s;
            z-index: 9998;
        }
        #header-mask.active { opacity: 1; visibility: visible; }

        /* Scrolled */
        #header.scrolled {
            background: rgba(255,255,255,0.7) !important;
            box-shadow:
                    0 2px 0 0 rgba(255,255,255,0.5) inset,
                    0 12px 40px -6px rgba(0,0,0,0.08),
                    0 3px 10px -3px rgba(0,0,0,0.04) !important;
        }
    </style>

    <div id="header-mask"></div>
    <div id="header">
        <div id="header-bar">
            <a th:href="@{/}" style="text-decoration:none; display:flex; align-items:center;">
                <div id="logo"><img th:src="@{/img/interface/LOGO_B.png}" alt="OnFit 로고"></div>
            </a>

            <nav>
                <ul>
                    <li><a th:href="@{/AIStyler}">AI진단</a></li>
                    <li><a th:href="@{/store}">스토어</a></li>
                    <li><a th:href="@{/community}">커뮤니티</a></li>
                    <li><a th:href="@{/MyPalette}">내 팔레트</a></li>
                </ul>
            </nav>

            <div id="header-search-inline">
                <div id="header-search-box">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,0.35)" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <span id="header-search-placeholder">Mens Fashion Solution</span>
                </div>
            </div>

            <!-- 프로필 아이콘: 로그인 시 마이페이지 이동 + hover 툴팁(로그아웃) -->
            <a th:if="${session.loginMember != null}" th:href="@{/MyPage}" class="header_icon profile-tooltip-wrap" id="icon-profile" aria-label="마이페이지">
                <div class="header_icon-btn">
                    <img th:src="@{/img/Main/icon_profile_login.png}" alt="프로필">
                </div>
                <div class="profile-tooltip">
                    <span>마이페이지</span>
                    <div class="profile-tooltip-divider"></div>
                    <span th:onclick="|location.href='@{/logout}'|">로그아웃</span>
                </div>
            </a>

            <!-- 프로필 아이콘: 비로그인 시 로그인 페이지 이동 -->
            <a th:unless="${session.loginMember != null}" th:href="@{/login}" class="header_icon" id="icon-profile" aria-label="로그인">
                <div class="header_icon-btn">
                    <img th:src="@{/img/Main/icon_profile.png}" alt="프로필">
                </div>
            </a>

            <!-- 장바구니 아이콘: 바로 이동 -->
            <a th:href="@{/Cart}" class="header_icon" id="icon-cart" style="padding-right: 14px;" aria-label="장바구니">
                <div class="header_icon-btn">
                    <img th:src="@{/img/Main/icon_cart (1).png}" alt="장바구니">
                </div>
            </a>
        </div>



        <div id="search-panel">
            <div id="search-panel-inner">
                <div class="sp-input-row">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="search" id="sp-input" placeholder="OnFit.com 검색하기" autocomplete="off">
                    <span id="sp-cancel">창 닫기</span>
                </div>
                <div id="sp-initial-content">
                    <div class="sp-section-label">Popular Keywords</div>
                    <div class="sp-tags">
                        <div class="sp-tag">#AI진단</div>
                        <div class="sp-tag">#후디</div>
                        <div class="sp-tag">#캡</div>
                    </div>
                </div>
                <div id="sp-results-content">
                    <div class="search-result-container">
                        <div class="result-left">
                            <div class="sp-section-label">페이지 이동</div>
                            <div class="filter-buttons"></div>
                        </div>
                        <div class="result-right">
                            <div class="sp-section-label">상품 검색 결과</div>
                            <div class="product-grid"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function () {
            const header = document.getElementById('header');
            const mask = document.getElementById('header-mask');

            // ── 스크롤 이벤트 ──
            window.addEventListener('scroll', () => {
                if (header) header.classList.toggle('scrolled', window.scrollY > 20);
            }, { passive: true });

            // ── 현재 페이지 Nav Active 처리 ──
            const currentPath = window.location.pathname;
            document.querySelectorAll('#header-bar > nav ul li a').forEach(link => {
                const linkPath = new URL(link.href, location.origin).pathname;
                // 루트(/)는 제외하고, 현재 경로가 링크 경로로 시작하면 active
                if (linkPath !== '/' && currentPath.startsWith(linkPath)) {
                    link.classList.add('nav-active');
                }
            });

            const triggerBox = document.getElementById('header-search-box');
            const cancelBtn = document.getElementById('sp-cancel');
            const spInput = document.getElementById('sp-input');
            const initialContent = document.getElementById('sp-initial-content');
            const resultsContent = document.getElementById('sp-results-content');
            const menuContainer = document.querySelector('.filter-buttons');
            const productGrid = document.querySelector('.product-grid');

            // 검색창 열기/닫기
            function openSearch() {
                if (header) header.classList.add('search-open');
                if (mask) mask.classList.add('active');
                setTimeout(() => { if (spInput) spInput.focus(); }, 420);
            }
            function closeSearch() {
                if (header) header.classList.remove('search-open');
                if (mask) mask.classList.remove('active');
                if (spInput) spInput.value = '';
                if (initialContent) initialContent.style.display = 'block';
                if (resultsContent) resultsContent.style.display = 'none';
            }

            if (triggerBox) triggerBox.onclick = openSearch;
            if (cancelBtn) cancelBtn.onclick = closeSearch;
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSearch(); });

            // Popular Keywords 태그 클릭 시 검색 실행
            document.querySelectorAll('.sp-tag').forEach(tag => {
                tag.addEventListener('click', function () {
                    const keyword = this.textContent.replace(/^#/, '').trim();
                    if (spInput) {
                        spInput.value = keyword;
                        spInput.dispatchEvent(new Event('input'));
                    }
                });
            });

            if (mask) mask.onclick = () => closeSearch();

            // ── 라이브 검색 로직 ──
            if (spInput) {
                spInput.oninput = function () {
                    const keyword = this.value.trim();
                    if (keyword.length > 0) {
                        fetch(`/api/search/live?keyword=${encodeURIComponent(keyword)}&limit=8`)
                            .then(res => res.json())
                            .then(data => {
                                if (menuContainer) menuContainer.innerHTML = '';
                                if (data.menus && data.menus.length > 0) {
                                    data.menus.forEach((menu, idx) => {
                                        const btn = document.createElement('button');
                                        btn.className = `res-btn ${idx === 0 ? 'active' : ''}`;
                                        btn.textContent = menu.name;
                                        btn.onclick = () => location.href = menu.url;
                                        menuContainer.appendChild(btn);
                                    });
                                } else if (menuContainer) { menuContainer.innerHTML = '<p style="font-size:12px;color:#ccc;">결과 없음</p>'; }

                                if (productGrid) productGrid.innerHTML = '';
                                if (data.products && data.products.length > 0) {
                                    data.products.forEach(p => {
                                        productGrid.insertAdjacentHTML('beforeend', `
                                            <div class="prod-card" onclick="location.href='/itemDetail?id=${p.id}'">
                                                <div class="prod-img"><img src="${p.imgPath || '/img/no-image.png'}" alt="${p.name}"></div>
                                                <div class="prod-info">
                                                    <p class="p-name">${p.name}</p>
                                                    <p class="p-price">${Number(p.price).toLocaleString()}원</p>
                                                </div>
                                            </div>`);
                                    });
                                } else if (productGrid) { productGrid.innerHTML = '<p style="font-size:12px;color:#ccc;">상품 없음</p>'; }

                                if (initialContent) initialContent.style.display = 'none';
                                if (resultsContent) resultsContent.style.display = 'block';
                            })
                            .catch(err => console.error("Search API Error:", err));
                    } else {
                        if (initialContent) initialContent.style.display = 'block';
                        if (resultsContent) resultsContent.style.display = 'none';
                    }
                };
            }

        });
    </script>
</div>
</html>
