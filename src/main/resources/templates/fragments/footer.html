<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<footer th:fragment="footer">
    <div id="f_left">
        <a href="/"><img th:src="@{/img/interface/LOGO_W.png}" alt="OnFit 로고"></a>
        <p id="f_tagline">Mens Fashion Solution</p>
        <p id="f_copy">© 2026 OnFit. All rights reserved.</p>
    </div>
    <div id="f_right">
        <div class="f_nav_group">
            <p class="f_nav_title">AI 진단</p>
            <a th:href="@{/AIStyler} + '#tab-color'"><span>퍼스널 컬러 진단</span></a>

            <a th:href="@{/store} + '?category=SHIRT'"><span>셔츠</span></a>

            <a th:href="@{/community/profile}"><span>프로필</span></a>

</html>
