<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" th:href="@{/img/interface/favicon.png}" type="image/x-icon">
    <title>OnFit - 검색 결과</title>
    <link rel="stylesheet" th:href="@{/css/Main.css}">
    <link rel="stylesheet" th:href="@{/css/store.css}">
    <style>
        /* 검색 결과 페이지 전용 — store.css 위에 덮어쓰기 */
        .search-wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 120px 40px 80px;
        }
        .search-title {
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
        }
        .search-keyword {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 48px;
            color: #111;
        }
        .search-keyword span {
            color: #FFB834;
        }
        .search-section-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .search-section-title .count {
            font-size: 12px;
            color: #bbb;
            font-weight: 400;
            letter-spacing: 0;
            text-transform: none;
        }
        .search-empty {
            padding: 40px 0;
            color: #bbb;
            font-size: 14px;
        }
        /* store.css의 product-grid 재사용, 간격만 조정 */
        .product-grid {
            padding: 0 0 60px;
        }
        /* 게시글 섹션 */
        .post-section {
            margin-top: 60px;
        }
        .post-item {
            padding: 18px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .post-item:last-child {
            border-bottom: none;
        }
        .post-item a {
            font-size: 16px;
            font-weight: 600;
            color: #111;
            text-decoration: none;
            display: block;
            margin-bottom: 6px;
            transition: color 0.2s;
        }
        .post-item a:hover { color: #FFB834; }
        .post-meta {
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>

<div id="header-container"></div>

<div class="search-wrap">
    <p class="search-title">SEARCH RESULTS</p>
    <h1 class="search-keyword">
        '<span th:text="${searchQuery}"></span>'
        <span style="font-size:16px;font-weight:400;color:#aaa;">에 대한 검색 결과</span>
    </h1>

    <!-- ===== 상품 섹션 ===== -->
    <div class="product-section">
        <p class="search-section-title">
            쇼핑 아이템
            <span class="count" th:text="'(' + ${products.size()} + ')'"></span>
        </p>

        <div th:if="${products.isEmpty()}" class="search-empty">검색된 상품이 없습니다.</div>

        <main class="product-grid" th:unless="${products.isEmpty()}">
            <div th:each="p : ${products}"
                 class="product-item"
                 th:classappend="${p.options != null && !p.options.isEmpty() && (p.options[0].stock == null || p.options[0].stock <= 0)} ? 'is-sold-out' : ''">
                <a th:href="@{'/product/' + ${p.productId}}">
                    <div class="product-thumb">
                        <img th:src="${p.imgUrl}" th:alt="${p.name}">
                        <div th:if="${p.options != null && !p.options.isEmpty() && (p.options[0].stock == null || p.options[0].stock <= 0)}" class="sold-out-overlay">
                            <span class="sold-out-label">SOLD OUT</span>
                        </div>
                    </div>
                    <div class="product-info">
                        <p class="category" th:text="${p.category}"></p>
                        <p class="name" th:text="${p.name}"></p>
                        <p class="price">
                            <span th:text="'₩' + ${#numbers.formatInteger(p.price, 3, 'COMMA')}"></span>
                            <span th:if="${p.options != null && !p.options.isEmpty() && (p.options[0].stock == null || p.options[0].stock <= 0)}">
                                품절
                            </span>
                        </p>
                    </div>
                </a>
            </div>
        </main>
    </div>

    <!-- ===== 게시글 섹션 ===== -->
    <div class="post-section">
        <p class="search-section-title">
            커뮤니티 게시글
            <span class="count" th:text="'(' + ${posts.size()} + ')'"></span>
        </p>

        <div th:if="${posts.isEmpty()}" class="search-empty">검색된 게시글이 없습니다.</div>

        <div th:each="post : ${posts}" class="post-item">
            <a th:href="@{'/community/' + ${post.postId}}"
               th:text="${post.title}">제목</a>
            <div class="post-meta">
                <span th:text="${post.nickname}">닉네임</span>
                &nbsp;·&nbsp;
                <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">날짜</span>
            </div>
        </div>
    </div>

</div>

<div id="footer-mount"></div>
<script th:src="@{/js/include.js}"></script>
</body>
</html>
