<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" th:href="@{/img/interface/favicon.png}" type="image/x-icon">
    <title>OnFit — Community</title>
    <link rel="stylesheet" th:href="@{/css/Main.css}">
    <link rel="stylesheet" th:href="@{/css/CommunityDetail.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div id="wrap">
    <div class="detail-nav">
        <a href="/community" class="nav-back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            커뮤니티
        </a>
        <span class="detail-nav-category" id="navCategory"></span>
    </div>

    <div class="detail-layout">

        <!-- ── 메인 콘텐츠 ── -->
        <div class="detail-main">

            <!-- 게시글 헤더 -->
            <div class="post-card">
                <div class="post-header">
                    <div class="author-avatar">
                        <img src="/img/interface/ProfileDefault.png" alt="author" id="postAuthorImg">
                    </div>
                    <div class="author-info">
                        <span class="author-name" id="postAuthorName">작성자</span>
                        <span class="post-date" id="postDate"></span>
                    </div>
                    <!-- 수정/삭제 메뉴 (JS에서 본인 확인 후 삽입) -->
                    <div id="postMenuAnchor"></div>
                </div>

                <!-- 본문 -->
                <div class="post-body">
                    <p class="post-text" id="postText"></p>
                </div>

                <!-- 이미지 (단일: img / 다중: swiper) -->
                <div id="imageArea"></div>

                <!-- 상품 인용 -->
                <div id="productArea"></div>

                <!-- 통계 & 좋아요 -->
                <div class="post-stats">
                    <button class="stat-btn" id="postHeartBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                        <span id="postHeartCount">0</span>
                    </button>
                    <span class="stat-item">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        <span id="totalCommentCount">0</span>
                    </span>
                </div>
            </div><!-- /.post-card -->

            <!-- ── 댓글 영역 ── -->
            <div class="comments-wrap" id="comments">
                <h3 class="comments-title">댓글 <span id="commentCountLabel">0</span></h3>
                <div class="comments-list" id="commentsSection"></div>

                <!-- 댓글 입력 -->
                <div class="comment-input-card">
                    <div class="input-user-img">
                        <img src="/img/interface/ProfileDefault.png" alt="user" id="commentUserImg">
                    </div>
                    <input type="text" class="comment-input" placeholder="댓글을 남겨보세요." id="commentInput">
                    <button class="comment-submit-btn" id="submitCommentBtn">등록</button>
                </div>
            </div>

        </div><!-- /.detail-main -->
    </div><!-- /.detail-layout -->
</div><!-- /#wrap -->

<div th:replace="~{fragments/footer :: footer}"></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script th:src="@{/js/CommunityDetail.js}"></script>
</body>
</html>
