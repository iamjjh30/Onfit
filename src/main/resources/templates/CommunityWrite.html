<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" th:href="@{/img/interface/favicon.png}" type="image/x-icon">
    <title>OnFit — Community</title>
    <link rel="stylesheet" th:href="@{/css/Main.css}">
    <link rel="stylesheet" th:href="@{/css/CommunityWrite.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div id="wrap">
    <div class="write-page">

        <!-- 내비게이션 브레드크럼 (AIStyler 스타일) -->
        <div class="write-nav">
            <a th:href="@{/community}" class="nav-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                커뮤니티로 돌아가기
            </a>
        </div>

        <!-- 로그인 필요 -->
        <div id="loginRequired" class="login-required" style="display:none;">
            <div class="login-required-inner">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <p>게시글 작성은 로그인 후 이용 가능합니다.</p>
                <a href="/login" class="btn-primary-pill">로그인하기</a>
            </div>
        </div>

        <!-- 작성 폼 -->
        <div class="write-card" id="writeCard">
            <div class="write-card-header">
                <h1 class="write-title">새 게시글</h1>
            </div>

            <!-- 카테고리 탭 (알약형) -->
            <div class="field-group">
                <label class="field-label">카테고리</label>
                <div class="cat-tabs">
                    <button type="button" class="cat-tab active" data-menu="오늘의 핏">오늘의 핏</button>
                    <button type="button" class="cat-tab" data-menu="잡담">잡담</button>
                    <button type="button" class="cat-tab" data-menu="추천">추천</button>
                    <button type="button" class="cat-tab" data-menu="자랑">자랑</button>
                </div>
            </div>

            <!-- 내용 -->
            <div class="field-group">
                <label class="field-label" for="contentInput">내용</label>
                <textarea
                        class="write-textarea"
                        id="contentInput"
                        placeholder="자유롭게 내용을 작성해주세요."
                        maxlength="2000"></textarea>
                <div class="char-count"><span id="contentCount">0</span> / 2000</div>
            </div>

            <!-- 이미지 첨부 (다중) -->
            <div class="field-group">
                <label class="field-label">
                    이미지 첨부
                    <span class="field-label-sub">최대 5장</span>
                </label>

                <!-- 업로드 트리거 버튼 -->
                <div class="img-upload-trigger" id="imgUploadTrigger">
                    <input type="file" id="imgFileInput" accept="image/*" multiple style="display:none;">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    <span>클릭해서 이미지 추가</span>
                    <span class="img-count-badge" id="imgCountBadge" style="display:none;">0 / 5</span>
                </div>

                <!-- 미리보기 그리드 -->
                <div class="img-preview-grid" id="imgPreviewGrid"></div>
            </div>

            <!-- 상품 인용 -->
            <div class="field-group">
                <label class="field-label">
                    상품 인용
                    <span class="field-label-sub">선택</span>
                </label>
                <div class="product-picker">
                    <div class="product-picker-header" id="productPickerHeader">
                        <span>상품을 선택해서 게시글에 인용하세요</span>
                        <svg class="picker-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                    <div class="product-picker-body" id="productPickerBody" style="display:none;">
                        <input type="text" class="product-search" id="productSearchInput" placeholder="상품 이름으로 검색...">
                        <div class="product-items" id="productItems">
                            <div class="product-loading">상품 불러오는 중...</div>
                        </div>
                    </div>
                </div>
                <div class="selected-products" id="selectedProducts"></div>
            </div>

            <!-- 하단 버튼 -->
            <div class="write-actions">
                <button type="button" class="btn-cancel" onclick="history.back()">취소</button>
                <button type="button" class="btn-submit" id="submitBtn">게시하기</button>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<div id="toast"></div>
<script th:src="@{/js/CommunityWrite.js}"></script>
</body>
</html>
