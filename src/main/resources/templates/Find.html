<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/Main.css}"/>
    <link rel="stylesheet" th:href="@{/css/Find.css}"/>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" th:href="@{/img/interface/favicon.png}" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
    <title>OnFit.com — Find</title>
</head>
<body>

<div id="wrap">

    <div id="header">
        <a th:href="@{/Main}" class="logo-link">
            <img th:src="@{/img/interface/LOGO_B.png}" alt="OnFit Logo">
        </a>
        <span class="header-tag">Account Recovery</span>
    </div>

    <div id="main">

        <div class="left-panel">
            <div class="left-inner">
                <div class="season-label">Account Support</div>
                <h2 class="editorial-title">Find Your<br><em>Account</em></h2>
                <p class="editorial-sub">아이디 또는 비밀번호를<br>잊으셨나요? 쉽게 찾아드릴게요.</p>
                <div class="accent-bar"></div>
            </div>
            <div class="deco-circle c1"></div>
            <div class="deco-circle c2"></div>
        </div>

        <div class="right-panel">
            <div class="form-container">

                <div class="mode-tab">
                    <button class="tab-btn active" id="tab-id" onclick="setMode('id')">아이디 찾기</button>
                    <button class="tab-btn" id="tab-pw" onclick="setMode('pw')">비밀번호 찾기</button>
                </div>

                <div class="step-indicator">
                    <div class="step-dot active" id="dot1"></div>
                    <div class="step-line" id="line1"></div>
                    <div class="step-dot" id="dot2"></div>
                    <div class="step-line" id="line2"></div>
                    <div class="step-dot" id="dot3"></div>
                </div>

                <div class="step-panel active" id="step1">
                    <h1 id="step1-title">성함을 입력해주세요</h1>
                    <div class="input-wrap">
                        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                        <input type="text" id="name" class="field-input" placeholder="홍길동" required>
                    </div>
                    <button class="next-btn" onclick="goNext(1)">
                        <span>다음</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
                    </button>
                </div>

                <div class="step-panel" id="step2">
                    <h1>전화번호를 입력해주세요</h1>
                    <div class="input-wrap">
                        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 3.09 4.18 2 2 0 0 1 5.07 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 5 5l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z"/></svg>
                        <input type="tel" id="tel" class="field-input" placeholder="010-0000-0000" required>
                    </div>
                    <button class="next-btn" onclick="goNext(2)">
                        <span>조회하기</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
                    </button>
                    <button class="back-btn" onclick="goBack(1)">← 이전으로</button>
                </div>

                <div class="step-panel" id="step3">
                    <h1>정보를 찾았습니다</h1>
                    <div class="result-box">
                        <div class="result-label" id="result-label">아이디</div>
                        <div class="result-value" id="result"></div>
                    </div>
                    <a th:href="@{/Login}">
                        <button class="next-btn">
                            <span>로그인하기</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
                        </button>
                    </a>
                </div>

                <div class="bottom-row">
                    <a th:href="@{/Login}" class="back-link">← 로그인으로 돌아가기</a>
                </div>

            </div>
        </div>

    </div>
</div>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<script th:src="@{/js/Find.js}"></script>
<script>
    let currentMode = 'id';

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('tab-id').classList.toggle('active', mode === 'id');
        document.getElementById('tab-pw').classList.toggle('active', mode === 'pw');
        document.getElementById('step1-title').textContent = '성함을 입력해주세요';
        goToStep(1);
    }

    function goToStep(n) {
        [1,2,3].forEach(i => {
            document.getElementById('step' + i).classList.toggle('active', i === n);
            document.getElementById('dot' + i).classList.toggle('active', i <= n);
        });
        document.getElementById('line1').classList.toggle('active', n >= 2);
        document.getElementById('line2').classList.toggle('active', n >= 3);
    }

    function goNext(from) {
        if (from === 1) {
            if (!document.getElementById('name').value.trim()) { alert('성함을 입력해주세요'); return; }
            goToStep(2);
        } else if (from === 2) {
            if (!document.getElementById('tel').value.trim()) { alert('전화번호를 입력해주세요'); return; }

            // 나중에 여기서 서버 API(fetch)를 호출하여 실제 아이디/비밀번호를 가져오도록 수정하시면 됩니다.
            document.getElementById('result-label').textContent = currentMode === 'id' ? '아이디' : '임시 비밀번호';
            document.getElementById('result').textContent = currentMode === 'id' ? 'onfit_user***' : '●●●●●●';
            goToStep(3);
        }
    }

    function goBack(to) { goToStep(to); }
</script>
</body>
</html>
