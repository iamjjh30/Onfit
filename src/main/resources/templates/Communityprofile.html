<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" th:href="@{/img/interface/favicon.png}" type="image/x-icon">
    <title>OnFit — Community</title>
    <link rel="stylesheet" th:href="@{/css/Main.css}">
    <link rel="stylesheet" th:href="@{/css/CommunityProfile.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div id="wrap">

    <!-- 내비 -->
    <div class="profile-nav">
        <a href="/community" class="nav-back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
            커뮤니티
        </a>
    </div>

    <!-- 프로필 카드 -->
    <div class="profile-card">
        <div class="profile-avatar-wrap">
            <div class="profile-avatar" id="profileAvatarWrap">
                <img id="profileImg" src="/img/interface/ProfileDefault.png" alt="프로필 이미지">
            </div>
            <button class="avatar-edit-btn" id="avatarEditBtn" title="프로필 이미지 변경">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
            </button>
            <input type="file" id="avatarFileInput" accept="image/*" style="display:none;">
        </div>
        <div class="profile-info">
            <h2 class="profile-name" id="profileName">—</h2>
            <p class="profile-email" id="profileEmail">—</p>
        </div>
        <div class="profile-stats">
            <div class="profile-stat">
                <span class="stat-num" id="statPosts">0</span>
                <span class="stat-label">게시글</span>
            </div>
            <div class="profile-stat-divider"></div>
            <div class="profile-stat">
                <span class="stat-num" id="statComments">0</span>
                <span class="stat-label">댓글</span>
            </div>
            <div class="profile-stat-divider"></div>
            <div class="profile-stat">
                <span class="stat-num" id="statLikes">0</span>
                <span class="stat-label">좋아요</span>
            </div>
        </div>
    </div>

    <!-- 탭 -->
    <div class="profile-tabs">
        <button class="profile-tab active" data-tab="posts">내 게시글</button>
        <button class="profile-tab" data-tab="comments">내 댓글</button>
        <button class="profile-tab" data-tab="likes">좋아요한 글</button>
    </div>

    <!-- 탭 콘텐츠 -->
    <div class="tab-content" id="tabContent">
        <div class="loading-state">
            <div class="loading-spinner"></div>
            <span>불러오는 중...</span>
        </div>
    </div>

</div>

<!-- 크롭 모달 -->
<div class="crop-modal-overlay" id="cropModalOverlay">
    <div class="crop-modal">
        <div class="crop-modal-header">
            <h3 class="crop-modal-title">프로필 이미지 편집</h3>
            <button class="crop-modal-close" id="cropModalClose">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="crop-modal-body">
            <div class="crop-container">
                <img id="cropImage" src="" alt="크롭 이미지">
            </div>
            <p class="crop-hint">드래그로 위치를, 핀치/스크롤로 크기를 조절하세요</p>
        </div>
        <div class="crop-modal-footer">
            <button class="crop-btn-cancel" id="cropCancel">취소</button>
            <button class="crop-btn-save" id="cropSave">저장</button>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<div id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script th:src="@{/js/CommunityProfile.js}"></script>
</body>
</html>
