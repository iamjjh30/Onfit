<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 상세 정보 및 활동 로그</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; padding: 40px; margin: 0; }
        .detail-container { max-width: 1100px; margin: 0 auto; background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .user-info { display: flex; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 30px; justify-content: space-between; }
        .info-card h1 { font-size: 28px; color: #333; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; text-decoration: none; font-size: 14px; }
        .btn-back { background: #eee; color: #555; }
        .btn-del { background: #e74c3c; color: white; }
        .db-info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; background: #f9f9f9; padding: 25px; border-radius: 10px; margin-bottom: 40px; border: 1px solid #eee; }
        .db-item { display: flex; flex-direction: column; }
        .db-label { font-size: 12px; color: #999; margin-bottom: 5px; font-weight: bold; }
        .db-value { font-size: 15px; color: #222; font-weight: 500; }
        .log-section { margin-bottom: 40px; }
        .log-table { width: 100%; border-collapse: collapse; background: white; }
        .log-table th { background: #fafafa; padding: 12px; border-bottom: 2px solid #eee; text-align: left; font-size: 13px; color: #777; }
        .log-table td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; color: #444; }
        .badge { padding: 4px 10px; border-radius: 4px; font-size: 12px; color: white; font-weight: bold; }
        .bg-buy { background: #4caf50; } .bg-fit { background: #ff9800; } .bg-post { background: #2196f3; }
        .tag-cool { background: #e3f2fd; color: #1e88e5; } .tag-warm { background: #fff3e0; color: #fb8c00; }
        .empty-msg { padding: 20px; text-align: center; color: #bbb; font-size: 14px; }
    </style>
</head>
<body>

<div class="detail-container">
    <div class="user-info">
        <div class="info-card">
            <h1 th:text="${m.name} + ' (' + ${m.loginId} + ')'">회원명 (ID)</h1>
            <p>
                퍼스널 컬러: <span class="badge" th:classappend="${m.personalColor == 'SUMMER_COOL' || m.personalColor == 'WINTER_COOL' ? 'tag-cool' : 'tag-warm'}" th:text="${m.personalColor != null ? m.personalColor : '미진단'}">-</span>
                | 스타일 DNA: <span style="font-weight: bold; color: #333;" th:text="${m.styleDna != null ? m.styleDna : '-'}">-</span>
            </p>
        </div>
        <div class="btn-group">
            <button class="btn btn-back" onclick="history.back()">뒤로가기</button>
            <button th:if="${m.loginId != 'kdoryul'}" class="btn btn-del"
                    th:onclick="'if(confirm(\'이 회원을 강제로 탈퇴시키겠습니까?\')){ location.href=\'/admin/member/delete/' + ${m.id} + '\'; }'">
                회원 삭제
            </button>
        </div>
    </div>

    <div class="log-section">
        <h3>📋 기본 계정 정보</h3>
        <div class="db-info-grid">
            <div class="db-item"><div class="db-label">이메일</div><div class="db-value" th:text="${m.email}">-</div></div>
            <div class="db-item"><div class="db-label">전화번호</div><div class="db-value" th:text="${m.tel}">-</div></div>
            <div class="db-item"><div class="db-label">생년월일</div><div class="db-value" th:text="${m.birthDate}">-</div></div>
            <div class="db-item"><div class="db-label">스타일 레벨</div><div class="db-value" th:text="'LV. ' + ${m.styleLevel}">LV. 0</div></div>
            <div class="db-item"><div class="db-label">가입일시</div><div class="db-value" th:text="${#temporals.format(m.createdAt, 'yyyy-MM-dd HH:mm')}">-</div></div>
            <div class="db-item"><div class="db-label">고유번호(UID)</div><div class="db-value" th:text="${m.id}">-</div></div>
        </div>
    </div>

    <div class="log-section">
        <h3>🛒 최근 구매 내역</h3>
        <table class="log-table">
            <thead><tr><th>날짜</th><th>주문번호</th><th>금액</th><th>상태</th></tr></thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd')}">2026-04-19</td>

                <td th:text="${order.orderId}">ONFIT-123456</td>

                <td th:text="${#numbers.formatInteger(order.totalAmount, 3, 'COMMA')} + '원'">0원</td>

                <td><span class="badge bg-buy" th:text="${order.status}">상태</span></td>
            </tr>
            <tr th:if="${#lists.isEmpty(orders)}"><td colspan="4" class="empty-msg">구매 내역이 없습니다.</td></tr>
            </tbody>
        </table>
    </div>

    <div class="log-section">
        <h3>🤳 모바일 피팅실 이용 내역</h3>
        <table class="log-table">
            <thead><tr><th>날짜</th><th>진단 항목</th><th>결과값</th></tr></thead>
            <tbody>
            <tr th:each="fit : ${fittings}">
                <td th:text="${#temporals.format(fit.fitDate, 'yyyy-MM-dd')}">2026-04-19</td>
                <td th:text="${fit.type}">진단 항목</td>
                <td><span class="badge tag-cool" th:text="${fit.result}">-</span></td>
            </tr>
            <tr th:if="${#lists.isEmpty(fittings)}"><td colspan="3" class="empty-msg">피팅 내역이 없습니다.</td></tr>
            </tbody>
        </table>
    </div>

    <div class="log-section">
        <h3>✍ 작성한 게시글</h3>
        <table class="log-table">
            <thead><tr><th>날짜</th><th>제목</th><th>조회수</th></tr></thead>
            <tbody>
            <tr th:each="post : ${posts}">
                <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">2026-04-15</td>
                <td th:text="${post.title}">제목</td>
                <td th:text="${post.viewCount}">0</td>
            </tr>
            <tr th:if="${#lists.isEmpty(posts)}"><td colspan="3" class="empty-msg">작성한 게시글이 없습니다.</td></tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
